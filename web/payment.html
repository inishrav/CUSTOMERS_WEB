<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Details</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h1>Payment Details</h1>

    <div class="nav-buttons">
        <button type="button"
                onclick="window.location.href='add-entry.html'">
            ← Back
        </button>
    </div>

    <br>

    <input
        type="text"
        id="searchBox"
        placeholder="Search Customer Name..."
    >

    <br><br>

    <div class="card">
        <h3>Total Paid Amount</h3>
        <p id="totalPaid">0</p>
    </div>

    <hr>

    <form id="paymentForm">

        <label for="paymentDate">Date</label>
        <input
            type="date"
            id="paymentDate"
            required>

        <label for="customerName">Customer Name</label>
        <input
            type="text"
            id="customerName"
            placeholder="Enter Customer Name"
            required>

        <label for="paymentMode">Mode Of Payment</label>
        <select id="paymentMode" required>
            <option value="" disabled selected>Select Payment Mode</option>
            <option value="Cash">Cash</option>
            <option value="UPI">UPI</option>
            <option value="Cheque">Cheque</option>
            <option value="Bank Transfer">Bank Transfer</option>
            <option value="Google Pay">Google Pay</option>
            <option value="PhonePe">PhonePe</option>
            <option value="Paytm">Paytm</option>
            <option value="Credit Card">Credit Card</option>
            <option value="Debit Card">Debit Card</option>
            <option value="Others">Others (Type Specific Details)</option>
        </select>

        <div id="otherModeContainer" style="display: none; margin-top: 10px;">
            <label for="otherModeDetails">Specify Other Payment Details / Person Name</label>
            <input
                type="text"
                id="otherModeDetails"
                placeholder="Enter details or who made the payment">
        </div>

        <label for="amountGiven" style="margin-top: 10px;">Amount Given</label>
        <input
            type="number"
            id="amountGiven"
            placeholder="Enter Amount"
            required>

        <br><br>

        <button type="submit">
            Save Payment
        </button>

    </form>

    <hr>

    <h2>Payment Records</h2>

    <table border="1" width="100%" id="paymentTable">

        <thead>
            <tr>
                <th>Date</th>
                <th>Customer</th>
                <th>Mode</th>
                <th>Amount</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="paymentBody">
        </tbody>

    </table>

</div>

<script src="js/payment.js"></script>

</body>
</html>
