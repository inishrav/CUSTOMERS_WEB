<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Entry - Customer Ledger</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Light Theme Executive Makeover */
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc; /* Clean Light Gray/White Background */
            color: #0f172a; /* Dark text for high contrast readability */
            overflow-x: hidden;
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
            width: 100vw;
        }

        /* ------------------------------------------
           LIGHT THEME SIDEBAR CONFIGURATION
        ------------------------------------------ */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: #0f172a; /* Dark enterprise sidebar to anchor design */
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 10;
        }

        .sidebar-brand-wrapper {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        .sidebar-title {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffffff;
            text-transform: uppercase;
            margin: 0;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .sidebar-item {
            margin-bottom: 8px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .sidebar-link:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
        }

        .sidebar-item.active .sidebar-link {
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.15);
            border-left: 3px solid #3b82f6;
            font-weight: 600;
        }

        .sidebar-footer {
            font-size: 0.75rem;
            color: #475569;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 16px;
        }

        /* ------------------------------------------
           MAIN CONTENT WORKSPACE AREA
        ------------------------------------------ */
        .main-content {
            flex-grow: 1;
            margin-left: 280px; 
            padding: 40px;
            box-sizing: border-box;
            background-color: #ffffff; /* White canvas background */
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #e2e8f0; /* Crisp subtle layout borders */
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        h1, h2 {
            margin-top: 0;
            color: #0f172a;
        }

        hr {
            border: 0;
            border-top: 1px solid #e2e8f0;
            margin: 30px 0;
        }
    </style>
</head>
<body>

<div class="dashboard-container">

    <!-- Premium Left Sidebar -->
    <aside class="sidebar">
        <!-- <div class="sidebar-brand-wrapper">
            <h2 class="sidebar-title">Arun Business System</h2>
        </div> -->

        <ul class="sidebar-menu">
            <li class="sidebar-item">
                <a href="index.html" class="sidebar-link">
                    <span>🏠</span> Home
                </a>
            </li>
            <li class="sidebar-item active">
                <a href="add-entry.html" class="sidebar-link">
                    <span>👤</span> Customer Details
                </a>
            </li>
            <li class="sidebar-item">
                <a href="payment.html" class="sidebar-link">
                    <span>💳</span> Payment Details
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            &copy; 2026 ARUN Ledger System
        </div>
    </aside>

    <!-- Main Workspace Area -->
    <main class="main-content">
        <div class="container">

            <h1>Customer Entry</h1>

            <form id="entryForm">

                <label for="customerName">Customer Name</label>
                <input
                    type="text"
                    id="customerName"
                    placeholder="Enter Customer Name"
                    required>

                <label for="date">Date</label>
                <input
                    type="date"
                    id="date"
                    required>

                <label for="grossWeight">Gross Weight</label>
                <input
                    type="number"
                    id="grossWeight"
                    placeholder="Enter Gross Weight"
                    required>

                <label for="netWeight">Net Weight</label>
                <input
                    type="number"
                    id="netWeight"
                    placeholder="Enter Net Weight"
                    required>

                <label for="kgRate">KG Rate</label>
                <input
                    type="number"
                    id="kgRate"
                    placeholder="Enter KG Rate"
                    required>

                <div class="button-group">

                    <button type="submit">
                        Save Entry
                    </button>

                    <!-- <button
                        type="button"
                        onclick="window.location.href='payment.html'">
                        Next →
                    </button> -->

                </div>

            </form>

            <hr>

            <h2>Customer Records</h2>

            <div class="search-container">

                <input
                    type="text"
                    id="searchCustomer"
                    placeholder="Search Customer Name...">

                <input
                    type="text"
                    id="searchFinancialYear"
                    placeholder="Financial Year (Ex: 25-26)">

            </div>

            <table border="1" width="100%">
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Date</th>
                        <th>Gross Weight</th>
                        <th>Net Weight</th>
                        <th>KG Rate</th>
                        <th>Amount</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="customerTableBody">
                </tbody>

            </table>

            <div id="summarySection" style="display:none;margin-top:30px;">

                <h2>Customer's Individual Total</h2>

                <table border="1" width="100%">
                    <thead>
                        <tr>
                            <th>Customer</th>
                            <th>Total Gross Weight</th>
                            <th>Total Net Weight</th>
                            <th>Total Amount</th>
                        </tr>
                    </thead>

                    <tbody id="summaryTableBody">
                    </tbody>

                </table>

            </div>

        </div>
    </main>

</div>

<script src="js/entry.js"></script>

</body>
</html>
